<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin & Scalps Clinic | Review Funnel</title>

<style>
  :root {
    --primary: #667eea;
    --secondary: #764ba2;
    --success: #00c853;
    --google: #4285F4;
    --star-gold: #FFD700;
  }

  .rf-wrapper {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    color: #fff;
    border-radius: 20px;
  }

  .box {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.1);
  }

  h2 { margin-bottom: 10px; font-weight: 600; }
  p.subtitle { margin-bottom: 25px; font-size: 0.9rem; opacity: 0.9; }

  .stars {
    margin-bottom: 25px;
  }

  .star {
    font-size: 40px;
    cursor: pointer;
    color: rgba(255,255,255,0.3);
    transition: all 0.2s ease;
    display: inline-block;
  }
  .star.active { color: var(--star-gold); transform: scale(1.1); }
  .star:hover { transform: scale(1.2); }

  .hidden { display: none; }

  .form-group { text-align: left; margin-bottom: 15px; }
  
  input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.9);
    color: #333;
    box-sizing: border-box;
    font-size: 1rem;
  }

  textarea { height: 100px; resize: none; }

  .review-box {
    background: rgba(255, 255, 255, 0.2);
    padding: 15px;
    border-radius: 15px;
    margin: 20px 0;
    font-style: italic;
    line-height: 1.5;
    position: relative;
    min-height: 60px;
  }

  button {
    padding: 14px;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    transition: opacity 0.2s;
    font-size: 1rem;
  }

  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-submit { background: #fff; color: var(--secondary); }
  .btn-copy { background: var(--success); color: #fff; }
  .btn-google { background: #fff; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
  
  .loading-spinner {
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top: 3px solid #fff;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(3600deg); }
  }

  .status-msg { margin-top: 15px; font-size: 0.9rem; }
</style>
</head>

<body>

<div class="rf-wrapper">
  <div class="box">
    <h2 id="businessName">Skin & Scalps Clinic</h2>
    <p class="subtitle">We value your feedback!</p>
  
    <div class="stars">
      <span class="star" onclick="handleRate(1)">★</span>
      <span class="star" onclick="handleRate(2)">★</span>
      <span class="star" onclick="handleRate(3)">★</span>
      <span class="star" onclick="handleRate(4)">★</span>
      <span class="star" onclick="handleRate(5)">★</span>
    </div>
  
    <!-- FEEDBACK FORM (1-3 stars) -->
    <div id="feedbackForm" class="hidden">
      <div class="form-group">
        <input id="fbName" placeholder="Your Name">
      </div>
      <div class="form-group">
        <input id="fbPhone" placeholder="Phone Number">
      </div>
      <div class="form-group">
        <textarea id="fbMessage" placeholder="How can we improve?"></textarea>
      </div>
      <button class="btn-submit" onclick="submitFeedback()">
        <span id="fbLoading" class="hidden"><span class="loading-spinner"></span></span>
        Submit Feedback
      </button>
    </div>
  
    <!-- REVIEW DISPLAY (4-5 stars) -->
    <div id="reviewDisplay" class="hidden">
      <p>AI Generated Review for You:</p>
      <div class="review-box" id="reviewContent">
        <span class="loading-spinner"></span> Generating...
      </div>
      
      <button id="googleBtn" class="btn-google" onclick="copyAndGo()" disabled>
        <img src="https://www.google.com/favicon.ico" width="18" alt="Google">
        <span id="googleBtnText">Generating Review...</span>
      </button>
      <p style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;">Clicking will copy the review and open Google.</p>
    </div>
  
    <div id="statusMsg" class="status-msg"></div>
  </div>
</div>

<script>
  // ---- Config & State ----
  const API_BASE = 'https://web-production-eb25d.up.railway.app/api';
  const urlParams = new URLSearchParams(window.location.search);
  const clientId = urlParams.get('id') || 'clinic1'; // Default to clinic1
  let currentRating = 0;
  let googleReviewLink = '';

  // ---- Initial Actions ----
  window.addEventListener('load', () => {
    trackScan();
  });

  async function trackScan() {
    try {
      await fetch(`${API_BASE}/track-scan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId })
      });
    } catch (err) {
      console.error('Scan tracking failed', err);
    }
  }

  // ---- Star Rating Logic ----
  function handleRate(n) {
    currentRating = n;
    const stars = document.querySelectorAll('.star');
    stars.forEach((s, i) => s.classList.toggle('active', i < n));

    if (n <= 3) {
      document.getElementById('feedbackForm').classList.remove('hidden');
      document.getElementById('reviewDisplay').classList.add('hidden');
      clearStatus();
    } else {
      document.getElementById('feedbackForm').classList.add('hidden');
      document.getElementById('reviewDisplay').classList.remove('hidden');
      generateAIReview(n);
    }
  }

  // ---- Feedback Submission ----
  async function submitFeedback() {
    const name = document.getElementById('fbName').value;
    const phone = document.getElementById('fbPhone').value;
    const message = document.getElementById('fbMessage').value;
    const loading = document.getElementById('fbLoading');
    const msg = document.getElementById('statusMsg');

    if (!name || !phone || !message) {
      showStatus('Please fill all fields', 'orange');
      return;
    }

    loading.classList.remove('hidden');
    try {
      const res = await fetch(`${API_BASE}/feedback`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, name, phone, message, rating: currentRating })
      });
      const data = await res.json();
      
      if (data.success) {
        showStatus('Thank you for your feedback! We will contact you soon.', '#00ff88');
        document.getElementById('feedbackForm').innerHTML = '<h3>Feedback Sent!</h3>';
      } else {
        showStatus('Error: ' + data.error, 'red');
      }
    } catch (err) {
      showStatus('Network error. Try again.', 'red');
    } finally {
      loading.classList.add('hidden');
    }
  }

  // ---- AI Review Generation ----
  async function generateAIReview(rating) {
    const content = document.getElementById('reviewContent');
    const googleBtn = document.getElementById('googleBtn');
    const googleBtnText = document.getElementById('googleBtnText');
    
    content.innerHTML = '<span class="loading-spinner"></span> Generating unique review...';
    googleBtn.disabled = true;
    googleBtnText.innerText = 'Generating...';
    
    try {
      const res = await fetch(`${API_BASE}/generate-review`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, rating, name: 'Customer' })
      });
      const data = await res.json();

      if (data.success) {
        content.innerText = data.data.review;
        googleReviewLink = data.data.googleReviewLink;
        googleBtn.disabled = false;
        googleBtnText.innerText = 'Copy Review & Post on Google';
      } else {
        content.innerText = 'Failed to generate review: ' + data.error;
        googleBtnText.innerText = 'Error generating review';
      }
    } catch (err) {
      console.error('Generation error:', err);
      content.innerText = 'Network error: ' + err.message + '. Please check if the backend is live.';
      googleBtnText.innerText = 'Network Error';
    }
  }

  // ---- Utilities ----
  async function copyAndGo() {
    const text = document.getElementById('reviewContent').innerText;
    const googleBtnText = document.getElementById('googleBtnText');

    try {
      await navigator.clipboard.writeText(text);
      googleBtnText.innerText = 'Copied! Redirecting...';
      
      setTimeout(() => {
        window.open(googleReviewLink, '_blank');
        googleBtnText.innerText = 'Copy Review & Post on Google';
      }, 1000);
    } catch (err) {
      console.error('Clipboard failed', err);
      window.open(googleReviewLink, '_blank');
    }
  }

  function showStatus(text, color) {
    const msg = document.getElementById('statusMsg');
    msg.innerText = text;
    msg.style.color = color;
  }

  function clearStatus() {
    document.getElementById('statusMsg').innerText = '';
  }
</script>

</body>
</html>
